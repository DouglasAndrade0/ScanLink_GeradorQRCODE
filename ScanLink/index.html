<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <header>
        <div id="menu">
            <h1 class="logo"><span>Scan</span>Link</h1>
        </div>
    </header>
    <main>
        <div class="titulo">
            <p>Gerador de QR CODE</p>
            <h3>Transforme links em QR</h3>
        </div>
        <h1></h1>
        <div class="funcao">
            <input type="text" id="QRCODE_url" placeholder="https://seusite.com">
            <button type="button" id="QRCODE_gerar">GERAR</button>
            <img src="" id="QRCODE_img">
        </div>

    </main>
    <footer>

    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.js"
